<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ryan Bernardo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .contact {
            padding-top: 0 !important;
            margin-top: 0 !important;
        }

        .linkedin-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            padding: 12px 24px;
            background-color: #0077B5;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .linkedin-link:hover {
            background-color: #005f8f;
            transform: translateY(-1px);
        }

        .linkedin-link i {
            font-size: 20px;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">RYAN <strong>BERNARDO</strong></div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>
<section class="contact" style="min-height: calc(100vh - 60px); display: flex; flex-direction: column; justify-content: center; padding: 40px 24px;">
    <h1>Contact</h1>
    <p>I'd love to hear from you. Let's connect on LinkedIn or reach out for sports analytics discussions.</p>
    <div>
        <a href="https://www.linkedin.com/in/ryan-bernardo-6bb989149/" target="_blank" class="linkedin-link">

            Connect on LinkedIn
        </a>
    </div>
